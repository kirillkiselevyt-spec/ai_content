<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AI Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="history-toggle" class="history-trigger" onclick="toggleHistory()" title="История запросов">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </button>

  <div id="history-panel" class="history-panel">
    <div class="history-header">
      <h2>История запросов</h2>
      <button class="close-btn" onclick="toggleHistory()">⚡ Закрыть</button>
    </div>
    <div id="history-content" class="history-content">
      <p class="empty-msg">Загрузка истории...</p>
    </div>
  </div>

  <div class="container">
    <h1>AI Generator</h1>

    <label for="niche">Ниша (минимум 3 варианта)</label>
    <input id="niche" list="niche-list" placeholder="Выберите нишу" />
    <datalist id="niche-list">
      <option value="Маркетинг">
      <option value="IT">
      <option value="Образование">
    </datalist>

    <label for="audience">Аудитория</label>
    <input id="audience" placeholder="например: новички 18-25" />

    <label for="goal">Цель</label>
    <input id="goal" placeholder="например: увеличить продажи на 20%" />

    <label for="style">Стиль</label>
    <select id="style">
      <option value="formal">Официальный</option>
      <option value="friendly">Дружелюбный</option>
      <option value="sales">Продающий</option>
      <option value="creative">Креативный</option>
      <option value="minimal">Минимализм</option>
    </select>

    <button id="submit-btn" onclick="generate()">Сгенерировать</button>

    <pre id="output"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
