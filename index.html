<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ассистент</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="chat-shell">

  <header class="chat-header">
    <div class="header-avatar">AI</div>
    <div class="header-info">
      <span class="header-name">AI Ассистент</span>
      <span class="header-sub">Консультант · Аналитик · Стратег · Копирайтер</span>
    </div>
    <button class="clear-btn" onclick="clearChat()" title="Новый диалог">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.5"></path>
      </svg>
    </button>
  </header>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble">
        Привет. Я ваш универсальный AI-ассистент — один инструмент вместо команды специалистов.<br><br>
        Задавайте любые задачи: стратегия бизнеса, написание текстов, технические вопросы, анализ данных, автоматизация процессов.
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="userInput"
      placeholder="Напишите запрос..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()" aria-label="Отправить">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
