<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <h1>AI Generator</h1>

  <label for="niche">Ниша (минимум 3 варианта)</label>
  <input id="niche" list="niche-list" placeholder="Выберите нишу" />
  <datalist id="niche-list">
    <option value="Маркетинг">
    <option value="IT">
    <option value="Образование">
  </datalist>

  <label for="audience">Аудитория</label>
  <input id="audience" placeholder="например: новички 18-25" />

  <label for="goal">Цель</label>
  <input id="goal" placeholder="например: увеличить продажи на 20%" />

  <label>Стиль</label>
  <div class="custom-select-wrapper" id="custom-select-wrapper">
    <div class="custom-select-trigger" onclick="toggleSelect(event)">
      <span id="selected-style-label">Официальный</span>
      <input type="hidden" id="style" value="formal" />
      <div class="arrow"></div>
    </div>
    <div class="custom-options">
      <div class="custom-option selected" data-value="formal" onclick="selectOption(this)">Официальный</div>
      <div class="custom-option" data-value="friendly" onclick="selectOption(this)">Дружелюбный</div>
      <div class="custom-option" data-value="sales" onclick="selectOption(this)">Продающий</div>
      <div class="custom-option" data-value="creative" onclick="selectOption(this)">Креативный</div>
      <div class="custom-option" data-value="minimal" onclick="selectOption(this)">Минимализм</div>
    </div>
  </div>

  <button id="submitBtn" onclick="generate()">Сгенерировать</button>

  <div id="resultContainer" style="display: none; margin-top: 10px;">
    <label id="resultTitle" style="display: block; margin-bottom: 6px;">Результат генерации</label>
    <pre id="output"></pre>
    <button id="copyBtn" onclick="copyResult()" style="background: rgba(255,255,255,0.1); color: #fff; margin-top: 8px; width: auto; padding: 8px 16px; font-size: 13px;">
      <span id="copyBtnText">Скопировать</span>
    </button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
