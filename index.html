<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Generator</title>
    <style>
        /* CSS Reset & Apple Design Language */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #000000;
            --container-bg: linear-gradient(135deg, rgba(28, 28, 30, 0.75) 0%, rgba(18, 18, 18, 0.9) 100%);
            --accent-blue: #0071e3;
            --accent-blue-hover: #1482f0;
            --text-main: #f5f5f7;
            --text-secondary: #86868b;
            --text-placeholder: #48484a;
            --border-color: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-bg-focus: rgba(255, 255, 255, 0.08);
            --apple-easing: cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Главный контейнер с эффектом матового стекла и плавной анимацией */
        .app-container {
            width: 100%;
            max-width: 540px;
            background: var(--container-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 36px 28px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInContainer 0.6s var(--apple-easing) forwards;
        }

        @keyframes fadeInContainer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Заголовки */
        .app-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-title {
            font-size: 26pt;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-subtitle {
            font-size: 11pt;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Поля формы и их каскадное появление */
        .field-group {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInField 0.5s var(--apple-easing) forwards;
        }

        .field-group:nth-child(1) { animation-delay: 0.1s; }
        .field-group:nth-child(2) { animation-delay: 0.15s; }
        .field-group:nth-child(3) { animation-delay: 0.2s; }
        .field-group:nth-child(4) { animation-delay: 0.25s; }

        @keyframes fadeInField {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 10.5pt;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        label span {
            color: var(--text-secondary);
            font-size: 9pt;
            font-weight: 400;
            margin-left: 4px;
        }

        input[type="text"], select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 11pt;
            color: #ffffff;
            font-family: inherit;
            outline: none;
            transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        input[type="text"]:focus, select:focus {
            background-color: var(--input-bg-focus);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        input[type="text"]::placeholder {
            color: var(--text-placeholder);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2386868b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
            cursor: pointer;
        }

        /* Стильная Apple Кнопка */
        .submit-btn {
            width: 100%;
            background: linear-gradient(180deg, #0077ed 0%, #006edb 100%);
            border: 1px solid var(--accent-blue);
            border-radius: 12px;
            color: #ffffff;
            font-size: 12pt;
            font-weight: 500;
            padding: 16px;
            cursor: pointer;
            margin-top: 12px;
            letter-spacing: -0.1px;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.15);
            transition: all 0.2s var(--apple-easing);
        }

        .submit-btn:hover {
            background: linear-gradient(180deg, var(--accent-blue-hover) 0%, #0077ed 100%);
            box-shadow: 0 6px 16px rgba(0, 113, 227, 0.25);
        }

        .submit-btn:active {
            transform: scale(0.99);
            opacity: 0.95;
        }

        /* Сгруппированная зона результата (не выходит за рамки) */
        .result-container {
            margin-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 28px;
            display: none; /* Переключится на block из твоего обработчика при выводе */
            animation: fadeInContainer 0.5s var(--apple-easing) forwards;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 12pt;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-title::before {
            content: '';
            width: 7px;
            height: 7px;
            background-color: #30d158;
            border-radius: 50%;
            box-shadow: 0 0 8px #30d158;
        }

        /* Кнопка Копирования */
        .copy-btn {
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 9.5pt;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .copy-btn svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Ограниченный бокс вывода с внутренним премиум-скроллом */
        .result-box {
            background-color: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 20px;
            min-height: 80px;
            max-height: 320px;
            overflow-y: auto;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* Оформление внутренней структуры текста */
        .result-block {
            margin-bottom: 16px;
        }
        .result-block:last-child {
            margin-bottom: 0;
        }

        .result-meta {
            font-size: 8.5pt;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .result-text {
            font-size: 11pt;
            line-height: 1.55;
            color: #e8e8ed;
        }

        .result-box::-webkit-scrollbar {
            width: 6px;
        }
        .result-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .result-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1 class="app-title">AI Generator</h1>
            <div class="app-subtitle">Интеллектуальная генерация контента</div>
        </div>

        <form id="generatorForm">
            <div class="field-group">
                <label for="niche">Ниша <span>(минимум 3 варианта)</span></label>
                <input type="text" id="niche" placeholder="Выберите вашу нишу" required>
            </div>

            <div class="field-group">
                <label for="audience">Аудитория</label>
                <input type="text" id="audience" placeholder="например: новички 18-25" required>
            </div>

            <div class="field-group">
                <label for="target">Цель</label>
                <input type="text" id="target" placeholder="например: увеличить продажи на 20%" required>
            </div>

            <div class="field-group">
                <label for="style">Стиль</label>
                <select id="style">
                    <option value="official">Официальный</option>
                    <option value="friendly">Дружелюбный</option>
                    <option value="creative">Креативный</option>
                    <option value="minimal">Минималистичный</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Сгенерировать</button>
        </form>

        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <div class="result-title">Результат генерации</div>
                <button class="copy-btn" id="copyBtn" type="button">
                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span id="copyBtnText">Скопировать</span>
                </button>
            </div>
            <div class="result-box" id="resultBox">
