<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI Content Bot</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f0f0f;
      color: white;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #resultContainer {
      margin-top: 20px;
      display: none;
      background: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
    }

    #output {
      white-space: pre-wrap;
    }

    .modes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>AI генератор контента</h2>

<label>Ниша</label>
<input id="niche" placeholder="Например: кофейня">

<label>Аудитория</label>
<input id="audience" placeholder="Например: студенты 18-25">

<label>Цель</label>
<input id="goal" placeholder="Продажа / вовлечение">

<label>Стиль</label>
<select id="style">
  <option value="продающий">Продающий</option>
  <option value="дружелюбный">Дружелюбный</option>
  <option value="экспертный">Экспертный</option>
</select>

<div class="modes">
  <button onclick="setMode('post')">Пост</button>
  <button onclick="setMode('plan')">План</button>
  <button onclick="setMode('series')">Прогрев</button>
  <button onclick="setMode('hooks')">Хуки</button>
</div>

<button onclick="generate()">Сгенерировать</button>

<div id="resultContainer">
  <h3>Результат:</h3>
  <div id="output"></div>
</div>

<script src="app.js"></script>

</body>
</html>
